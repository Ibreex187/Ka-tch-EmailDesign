  <main>
    <!-- Register Section -->
    <section id="register" class="container mb-5 fade-in-animate">
      <div class="row justify-content-center gx-5 gy-4">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card shadow-sm">
            <h2 class="section-title mb-4"><i class="bi bi-person-plus me-2"></i>Register</h2>
            <hr class="section-divider">
            <form onsubmit="register(); return false;" autocomplete="off">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="reg-username" class="form-label">Username</label>
                  <input id="reg-username" name="reg-username" class="form-control" placeholder="Username" required autocomplete="username">
                </div>
                <div class="col-md-6">
                  <label for="reg-dob" class="form-label">Date of Birth</label>
                  <input id="reg-dob" name="reg-dob" type="date" class="form-control" required autocomplete="bday">
                </div>
                <div class="col-md-6">
                  <label for="reg-password" class="form-label">Password</label>
                  <div class="input-group">
                    <input id="reg-password" name="reg-password" type="password" class="form-control" placeholder="Password" required autocomplete="off">
                    <button class="btn btn-outline-secondary toggle-password" type="button" tabindex="-1" data-target="reg-password" aria-label="Show password">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="col-md-6">
                  <label for="reg-confirm-password" class="form-label">Confirm Password</label>
                  <div class="input-group">
                    <input id="reg-confirm-password" name="reg-confirm-password" type="password" class="form-control" placeholder="Confirm Password" required autocomplete="off">
                    <button class="btn btn-outline-secondary toggle-password" type="button" tabindex="-1" data-target="reg-confirm-password" aria-label="Show password">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="col-md-6">
                  <label for="reg-first-name" class="form-label">First Name</label>
                  <input id="reg-first-name" name="reg-first-name" class="form-control" placeholder="First Name" required autocomplete="given-name">
                </div>
                <div class="col-md-6">
                  <label for="reg-last-name" class="form-label">Last Name</label>
                  <input id="reg-last-name" name="reg-last-name" class="form-control" placeholder="Last Name" required autocomplete="family-name">
                </div>
              </div>
              <button type="submit" class="btn btn-primary-custom mt-4 w-100" id="register-btn">
                <i class="bi bi-person-plus me-1"></i>Register
                <span class="spinner-border spinner-border-sm d-none" id="register-spinner" role="status" aria-hidden="true"></span>
              </button>
            </form>
            <div id="reg-result" class="mt-3" aria-live="polite" aria-atomic="true"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Login Section -->
    <section id="login" class="container mb-5 fade-in-animate">
      <div class="row justify-content-center gx-5 gy-4">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card shadow-sm">
            <h2 class="section-title mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h2>
            <hr class="section-divider">
            <form onsubmit="login(); return false;" autocomplete="off">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="login-username" class="form-label">Username</label>
                  <input id="login-username" name="login-username" class="form-control" placeholder="Username" required autocomplete="username">
                </div>
                <div class="col-md-6">
                  <label for="login-password" class="form-label">Password</label>
                  <div class="input-group">
                    <input id="login-password" name="login-password" type="password" class="form-control" placeholder="Password" required autocomplete="off">
                    <button class="btn btn-outline-secondary toggle-password" type="button" tabindex="-1" data-target="login-password" aria-label="Show password">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>
              </div>
              <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary-custom flex-fill" id="login-btn">
                  Login
                  <span class="spinner-border spinner-border-sm d-none" id="login-spinner" role="status" aria-hidden="true"></span>
                </button>
                <button id="logout-btn" type="button" class="btn btn-outline-secondary flex-fill" onclick="logout()" style="display:none;">Logout</button>
              </div>
            </form>
            <div id="login-result" class="mt-3" aria-live="polite" aria-atomic="true"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Inbox Section -->
    <section id="inbox" class="container mb-5 fade-in-animate d-none">
      <div class="row justify-content-center gx-5 gy-4">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="section-title mb-0"><i class="bi bi-inbox me-2"></i>Inbox</h2>
              <hr class="section-divider">
              <button type="button" class="btn btn-primary-custom ms-2" onclick="getInbox()" id="inbox-btn">
                <span id="inbox-btn-text">Get Inbox</span>
                <span class="spinner-border spinner-border-sm d-none" id="inbox-spinner" role="status" aria-hidden="true"></span>
              </button>
            </div>
            <div class="input-group mb-3">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input type="text" id="inbox-search" class="form-control" placeholder="Search inbox..." aria-label="Search inbox">
            </div>
            <ul id="inbox-list" class="list-group" tabindex="0" aria-label="Inbox messages"></ul>
          </div>
        </div>
      </div>
    </section>

    <!-- Send Email Section -->
    <section id="send" class="container mb-5 fade-in-animate d-none">
      <div class="row justify-content-center gx-5 gy-4">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card shadow-sm">
            <h2 class="section-title mb-4"><i class="bi bi-send me-2"></i>Send Email</h2>
            <hr class="section-divider">
            <form onsubmit="sendMail(); return false;" autocomplete="off">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="to" class="form-label">To</label>
                  <input id="to" name="to" class="form-control" placeholder="Recipient Username" required autocomplete="username">
                </div>
                <div class="col-md-6">
                  <label for="subject" class="form-label">Subject</label>
                  <input id="subject" name="subject" class="form-control" placeholder="Subject" required>
                </div>
                <div class="col-12">
                  <label for="body" class="form-label">Body</label>
                  <textarea id="body" name="body" class="form-control" placeholder="Message" rows="3" required></textarea>
                </div>
              </div>
              <button type="submit" class="btn btn-primary-custom mt-4 w-100" id="send-btn">
                <i class="bi bi-envelope-paper me-1"></i>Send
                <span class="spinner-border spinner-border-sm d-none" id="send-spinner" role="status" aria-hidden="true"></span>

  <!-- Footer -->

  <script>
        // Hide splash screen after load
        window.addEventListener('DOMContentLoaded', function() {
          setTimeout(function() {
            const splash = document.getElementById('splash-screen');
            if (splash) {
              splash.style.opacity = '0';
              setTimeout(() => splash.style.display = 'none', 600);
            }
          }, 1200); // Show splash for 1.2s
        });
    // Fade-in for sections on show
    function fadeInSection(sectionId) {
      const el = document.getElementById(sectionId);
      if (el) {
        setTimeout(() => el.classList.add('visible'), 50);
      }
    }

            // Password show/hide toggle for all password fields
            document.addEventListener('DOMContentLoaded', function() {
              document.querySelectorAll('.toggle-password').forEach(function(btn) {
                btn.addEventListener('click', function() {
                  const targetId = btn.getAttribute('data-target');
                  const input = document.getElementById(targetId);
                  if (!input) return;
                  if (input.type === 'password') {
                    input.type = 'text';
                    btn.querySelector('i').classList.remove('bi-eye');
                    btn.querySelector('i').classList.add('bi-eye-slash');
                    btn.setAttribute('aria-label', 'Hide password');
                  } else {
                    input.type = 'password';
                    btn.querySelector('i').classList.remove('bi-eye-slash');
                    btn.querySelector('i').classList.add('bi-eye');
                    btn.setAttribute('aria-label', 'Show password');
                  }
                });
              });
            });
        // Section navigation and authentication state
        function showSection(section) {
          const sections = ['register', 'login', 'inbox', 'send'];
          sections.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
              el.classList.add('d-none');
              el.classList.remove('visible');
            }
          });
          const showEl = document.getElementById(section);
          if (showEl) {
            showEl.classList.remove('d-none');
            fadeInSection(section);
          }
        }

        function setAuthUI(isLoggedIn) {
          // Nav
          document.getElementById('nav-register').classList.toggle('d-none', isLoggedIn);
          document.getElementById('nav-login').classList.toggle('d-none', isLoggedIn);
          document.getElementById('nav-inbox').classList.toggle('d-none', !isLoggedIn);
          document.getElementById('nav-send').classList.toggle('d-none', !isLoggedIn);
          document.getElementById('nav-logout').classList.toggle('d-none', !isLoggedIn);
          // Sections
          document.getElementById('register').classList.toggle('d-none', isLoggedIn);
          document.getElementById('login').classList.toggle('d-none', isLoggedIn);
          document.getElementById('inbox').classList.toggle('d-none', !isLoggedIn);
          document.getElementById('send').classList.toggle('d-none', !isLoggedIn);
          // Old logout button (in login card)
          document.getElementById('logout-btn').style.display = isLoggedIn ? '' : 'none';
        }

        // On page load, show login by default
        document.addEventListener('DOMContentLoaded', function() {
          setAuthUI(false);
          showSection('login');
        });
    const api = 'https://ka-tch-email.onrender.com';

    function register() {
      const btn = document.getElementById('register-btn');
      const spinner = document.getElementById('register-spinner');
      btn.disabled = true;
      spinner.classList.remove('d-none');
      fetch(api + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('reg-username').value,
          password: document.getElementById('reg-password').value,
          confirm_password: document.getElementById('reg-confirm-password').value,
          first_name: document.getElementById('reg-first-name').value,
          last_name: document.getElementById('reg-last-name').value,
          dob: document.getElementById('reg-dob').value,
          email: 'dummy'
        }),
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          document.getElementById('reg-result').innerHTML = `<div class='alert alert-danger'>${data.error || 'Registration failed.'}</div>`;
        } else if (data.email) {
          document.getElementById('reg-result').innerHTML = `<div class='alert alert-success'>Registration successful!<br>Your email address: <strong>${data.email}</strong><br>Please use this email to log in.</div>`;
          // Reset form
          document.querySelector('#register form').reset();
        } else {
          document.getElementById('reg-result').innerHTML = `<div class='alert alert-warning'>Unexpected response.</div>`;
        }
        if (!data.error) {
          setTimeout(function() {
            showSection('login');
          }, 3000);
        }
      })
      .catch(() => {
        document.getElementById('reg-result').innerHTML = `<div class='alert alert-danger'>Network error. Please try again.</div>`;
      })
      .finally(() => {
        btn.disabled = false;
        spinner.classList.add('d-none');
      });
    }

    function login() {
      const btn = document.getElementById('login-btn');
      const spinner = document.getElementById('login-spinner');
      btn.disabled = true;
      spinner.classList.remove('d-none');
      fetch(api + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('login-username').value,
          password: document.getElementById('login-password').value
        }),
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          document.getElementById('login-result').innerHTML = `<div class='alert alert-danger'>${data.error || 'Login failed.'}</div>`;
        } else {
          document.getElementById('login-result').innerHTML = `<div class='alert alert-success'>Login successful!</div>`;
          // Reset form
          document.querySelector('#login form').reset();
          setAuthUI(true);
          showSection('inbox');
        }
      })
      .catch(() => {
        document.getElementById('login-result').innerHTML = `<div class='alert alert-danger'>Network error. Please try again.</div>`;
      })
      .finally(() => {
        btn.disabled = false;
        spinner.classList.add('d-none');
      });
    }

    function logout() {
      if (!window.confirm('Are you sure you want to log out?')) {
        return;
      }
      fetch(api + '/auth/logout', {
        method: 'POST',
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('login-result').innerText = JSON.stringify(data);
        setAuthUI(false);
        showSection('login');
      });
    }

    function getInbox() {
      const btn = document.getElementById('inbox-btn');
      const spinner = document.getElementById('inbox-spinner');
      const btnText = document.getElementById('inbox-btn-text');
      const list = document.getElementById('inbox-list');
      // Toggle: if visible, hide; if hidden, fetch and show
      if (!list.classList.contains('d-none')) {
        list.classList.add('d-none');
        btnText.textContent = 'Get Inbox';
        return;
      }
      btn.disabled = true;
      spinner.classList.remove('d-none');
      btnText.textContent = 'Loading...';
      fetch(api + '/mail/inbox', {
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        window._inboxEmails = Array.isArray(data) ? data : [];
        renderInboxList(window._inboxEmails);
        list.classList.remove('d-none');
        btnText.textContent = 'Hide Inbox';
      })
      .catch(() => {
        list.innerHTML = `<li class='list-group-item text-danger'>Network error. Please try again.</li>`;
        list.classList.remove('d-none');
        btnText.textContent = 'Hide Inbox';
      })
      .finally(() => {
        btn.disabled = false;
        spinner.classList.add('d-none');
      });
        // Render inbox list with optional filter
        function renderInboxList(emails, filter = '') {
          const list = document.getElementById('inbox-list');
          list.innerHTML = '';
          let filtered = emails;
          if (filter) {
            const f = filter.toLowerCase();
            filtered = emails.filter(email =>
              (email.subject && email.subject.toLowerCase().includes(f)) ||
              (email.from && email.from.toLowerCase().includes(f)) ||
              (email.body && email.body.toLowerCase().includes(f))
            );
          }
          if (filtered.length > 0) {
            filtered.forEach((email, idx) => {
              let initials = '';
              if (email.from) {
                const parts = email.from.split('@')[0].split(/[._\- ]+/);
                initials = parts.map(p => p[0] ? p[0].toUpperCase() : '').join('').slice(0,2);
              }
              const isUnread = email.unread === true;
              const avatarClass = 'avatar' + (isUnread ? ' new-email' : '');
              const badge = isUnread ? `<span class='unread-badge'>Unread</span>` : '';
              const li = document.createElement('li');
              li.className = 'list-group-item d-flex align-items-start inbox-fade-in' + (isUnread ? ' unread' : '');
              li.innerHTML = `<span class='${avatarClass}'>${initials || '?'}</span><div><strong>From:</strong> ${email.from} <br><strong>Subject:</strong> ${email.subject} ${badge}<br><strong>Body:</strong> ${email.body} <br><strong>Label:</strong> ${email.label}</div>`;
              list.appendChild(li);
              setTimeout(() => li.classList.add('visible'), 60 + idx * 60);
              if (isUnread) {
                setTimeout(() => {
                  const avatarEl = li.querySelector('.avatar');
                  if (avatarEl) avatarEl.classList.remove('new-email');
                }, 1200);
              }
            });
          } else {
            list.innerHTML = `<li class='list-group-item text-center text-muted'>No emails found.</li>`;
          }
        }

        // Search/filter event
        document.addEventListener('DOMContentLoaded', function() {
          const search = document.getElementById('inbox-search');
          if (search) {
            search.addEventListener('input', function() {
              renderInboxList(window._inboxEmails || [], search.value);
            });
          }
        });
    }

    function sendMail() {
      const btn = document.getElementById('send-btn');
      const spinner = document.getElementById('send-spinner');
      btn.disabled = true;
      spinner.classList.remove('d-none');
      fetch(api + '/mail/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to: document.getElementById('to').value,
          subject: document.getElementById('subject').value,
          body: document.getElementById('body').value
        }),
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          document.getElementById('send-result').innerHTML = `<div class='alert alert-danger'>${data.error || 'Failed to send email.'}</div>`;
        } else {
          document.getElementById('send-result').innerHTML = `<div class='alert alert-success'>Email sent successfully!</div>`;
          // Reset form
          document.querySelector('#send form').reset();
        }
      })
      .catch(() => {
        document.getElementById('send-result').innerHTML = `<div class='alert alert-danger'>Network error. Please try again.</div>`;
      })
      .finally(() => {
        btn.disabled = false;
        spinner.classList.add('d-none');
      });
    }

    // Fade-in animation on scroll
    function revealOnScroll() {
      const elements = document.querySelectorAll('.fade-in');
      const windowHeight = window.innerHeight;
      elements.forEach(el => {
        const position = el.getBoundingClientRect().top;
        if (position < windowHeight - 60) {
          el.classList.add('visible');
        }
      });
    }
    window.addEventListener('scroll', revealOnScroll);
    window.addEventListener('DOMContentLoaded', revealOnScroll);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
